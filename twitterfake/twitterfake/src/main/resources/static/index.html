<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TwitterFake</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="profile-card">
        <div class="logo">TF</div>

        <div>
          <h1>TwitterFake</h1>
          <p>Uma rede social fake para praticar Java + Spring Boot</p>
        </div>
      </section>

      <section class="composer">
        <h2>Criar postagem</h2>

        <form id="postForm">
          <input
            type="text"
            id="autor"
            placeholder="Seu nome"
            maxlength="80"
            required
          />

          <textarea
            id="conteudo"
            placeholder="O que está acontecendo?"
            maxlength="280"
            required
          ></textarea>

          <div class="form-footer">
            <span id="contador">0/280</span>
            <button type="submit">Publicar</button>
          </div>
        </form>
      </section>

      <section class="feed">
        <div class="feed-header">
          <h2>Feed</h2>
          <span>Postagens recentes</span>
        </div>

        <div id="posts"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
